<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Army Chat | Jungkook Fan Site</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* Specific Styles for Chat if not in your CSS yet */
        .chat-container {
            max-width: 600px;
            margin: 50px auto;
            background: #fff;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            overflow: hidden;
        }
        #chatBox {
            height: 400px;
            overflow-y: auto;
            padding: 20px;
            background: #f9f0ff; /* Light purple tint */
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .message-bubble {
            background: #6a00f4;
            color: white;
            padding: 10px 15px;
            border-radius: 18px 18px 18px 2px;
            align-self: flex-start;
            max-width: 80%;
            font-family: 'Poppins', sans-serif;
            font-size: 0.9rem;
            animation: fadeIn 0.3s ease;
        }
        .chat-input-area {
            display: flex;
            padding: 15px;
            background: white;
            border-top: 1px solid #eee;
        }
        #message {
            flex: 1;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 25px;
            outline: none;
            margin-right: 10px;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <section class="page-header" style="padding: 60px 0;">
        <div class="page-header-content">
            <h1>Fan Chat 💜</h1>
            <p>Connect with Army worldwide</p>
        </div>
    </section>

    <div class="chat-container">
        <div id="chatBox">
            <div class="message-bubble" style="background: #e0e0e0; color: #333;">
                Welcome to the JK Fan Chat! Say hi!
            </div>
        </div>

        <div class="chat-input-area">
            <input type="text" id="message" placeholder="Type a message..." onkeypress="handleKey(event)">
            <button class="btn btn-primary" onclick="sendMessage()" style="padding: 10px 20px; border-radius: 25px;">
                <i class="fas fa-paper-plane"></i>
            </button>
        </div>
    </div>

    <script>
        // Load messages from local storage on startup
        window.onload = () => {
            const savedMsgs = JSON.parse(localStorage.getItem('jk_messages')) || [];
            savedMsgs.forEach(m => displayMessage(m));
        };

        function handleKey(e) {
            if (e.key === 'Enter') sendMessage();
        }

        function sendMessage() {
            let input = document.getElementById("message");
            let msg = input.value.trim();

            if (msg !== "") {
                displayMessage(msg);
                saveMessage(msg);
                input.value = "";
                
                // Auto-scroll to bottom
                const chatBox = document.getElementById("chatBox");
                chatBox.scrollTop = chatBox.scrollHeight;
            }
        }

        function displayMessage(text) {
            let div = document.createElement("div");
            div.className = "message-bubble";
            div.innerText = text;
            document.getElementById("chatBox").appendChild(div);
        }

        function saveMessage(text) {
            let msgs = JSON.parse(localStorage.getItem('jk_messages')) || [];
            msgs.push(text);
            localStorage.setItem('jk_messages', JSON.stringify(msgs));
        }
    </script>
</body>
</html>
