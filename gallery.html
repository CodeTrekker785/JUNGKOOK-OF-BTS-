<!DOCTYPE html>
<html>
<head>
  <title>Gallery</title>
</head>
<body>

<h2>Jungkook Gallery</h2>
<div id="gallery"></div>

<script>
let gallery = document.getElementById("gallery");

for (let i = 1; i <= 100; i++) {
  let img = document.createElement("img");
  img.src = `media/photos/photo${i}.jpg`;
  img.width = 200;

  gallery.appendChild(img);
}
</script>

</body>
</html>
